<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AllocLab</title>
    <link rel="stylesheet" href="/styles.css?v=20260616-seed" />
  </head>
  <body>
    <div id="authOverlay" class="auth-overlay">
      <form id="authForm" class="auth-panel">
        <h2 data-i18n="authTitle">需要访问密钥</h2>
        <p data-i18n="authDescription">请输入访问密钥后继续使用组合回测。</p>
        <input id="authKeyInput" type="password" autocomplete="current-password" placeholder="访问密钥" data-i18n-placeholder="authPlaceholder" />
        <button id="authSubmitBtn" class="primary-btn" type="submit" data-i18n="verify">验证</button>
        <div id="authError" class="auth-error"></div>
        <a id="authHelpLink" href="#" target="_blank" rel="noreferrer" data-i18n="getKey">获取密钥</a>
      </form>
    </div>
    <main class="app-shell">
      <aside class="sidebar">
        <section class="panel">
          <div class="panel-head">
            <h1 data-i18n="appName">AllocLab</h1>
            <button id="runBtn" class="primary-btn" type="button" data-i18n="run">运行</button>
          </div>
          <div class="search-box">
            <input id="searchInput" type="search" placeholder="搜索代码 / 指数 / ETF / 基金" data-i18n-placeholder="searchPlaceholder" />
            <div id="searchResults" class="search-results"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <span data-i18n="assets">标的</span>
            <button id="normalizeBtn" type="button" class="ghost-btn" data-i18n="normalize">归一化</button>
          </div>
          <div id="assetList" class="asset-list"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <span data-i18n="favorites">收藏组合</span>
            <button id="saveFavoriteBtn" type="button" class="ghost-btn" data-i18n="save">保存</button>
          </div>
          <input id="favoriteNameInput" class="favorite-name" type="text" placeholder="组合名称" data-i18n-placeholder="favoriteName" />
          <div id="favoriteList" class="favorite-list"></div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <span data-i18n="rebalance">再平衡</span>
          </div>
          <div class="segmented" id="rebalanceModes">
            <button data-mode="none" type="button" data-i18n="rebalanceNone">不再平衡</button>
            <button data-mode="monthly" type="button" data-i18n="rebalanceMonthly">每月</button>
            <button data-mode="quarterly" type="button" data-i18n="rebalanceQuarterly">每季</button>
            <button data-mode="annual" type="button" data-i18n="rebalanceAnnual">每年</button>
            <button data-mode="threshold" type="button" data-i18n="rebalanceThreshold">阈值</button>
          </div>
          <label class="field-row">
            <span data-i18n="threshold">阈值</span>
            <input id="thresholdInput" type="number" min="1" max="50" step="1" value="20" />
            <span>%</span>
          </label>
          <div class="date-grid">
            <label>
              <span data-i18n="start">开始</span>
              <input id="startInput" type="date" />
            </label>
            <label>
              <span data-i18n="end">结束</span>
              <input id="endInput" type="date" />
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <span data-i18n="optimize">参数优化</span>
            <div class="optimizer-title-actions">
              <button id="compareAllBtn" type="button" class="ghost-btn" data-i18n="compareAll">全部对比</button>
              <button id="optimizeBtn" type="button" class="ghost-btn" data-i18n="scan">扫描</button>
            </div>
          </div>
          <div class="optimizer-controls">
            <label>
              <span data-i18n="optimizerStep">步长</span>
              <select id="optimizerStepInput">
                <option value="auto" data-i18n="auto">自动</option>
                <option value="0.025">2.5%</option>
                <option value="0.05">5%</option>
                <option value="0.1">10%</option>
                <option value="0.2">20%</option>
              </select>
            </label>
            <label>
              <span data-i18n="maxWeight">最大权重</span>
              <input id="optimizerMaxWeightInput" type="number" min="20" max="100" step="5" value="85" />
            </label>
            <label>
              <span data-i18n="maxDrawdownLimit">回撤上限</span>
              <input id="optimizerMaxDrawdownInput" type="number" min="1" max="95" step="1" data-i18n-placeholder="unlimited" placeholder="不限" />
            </label>
            <label>
              <span data-i18n="resultCount">返回数量</span>
              <input id="optimizerLimitInput" type="number" min="8" max="60" step="4" value="24" />
            </label>
          </div>
          <div class="optimizer-rule-controls" aria-label="扫描再平衡规则">
            <label><input type="checkbox" data-optimizer-rule="none" checked /><span data-i18n="rebalanceNone">不再平衡</span></label>
            <label><input type="checkbox" data-optimizer-rule="annual" checked /><span data-i18n="rebalanceAnnual">每年</span></label>
            <label><input type="checkbox" data-optimizer-rule="quarterly" checked /><span data-i18n="rebalanceQuarterly">每季</span></label>
            <label><input type="checkbox" data-optimizer-rule="threshold" checked /><span data-i18n="rebalanceThreshold">阈值</span></label>
            <label><input type="checkbox" data-optimizer-rule="monthly" /><span data-i18n="rebalanceMonthly">每月</span></label>
          </div>
        </section>
      </aside>

      <section class="main-area">
        <div class="topbar">
          <div>
            <h2 id="chartTitle" data-i18n="equityCurve">净值曲线</h2>
            <div id="rangeLabel" class="muted"></div>
          </div>
          <div class="interface-actions">
            <a class="github-link" href="https://github.com/Drincann/alloclab" target="_blank" rel="noreferrer" aria-label="GitHub" title="GitHub">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.86 8.37 6.84 9.73.5.09.68-.22.68-.49 0-.24-.01-1.05-.01-1.91-2.78.62-3.37-1.22-3.37-1.22-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.35 1.12 2.92.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.32 9.32 0 0 1 12 6.97c.85 0 1.7.12 2.5.35 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.79-4.57 5.05.36.32.68.95.68 1.92 0 1.39-.01 2.51-.01 2.85 0 .27.18.59.69.49A10.15 10.15 0 0 0 22 12.25C22 6.58 17.52 2 12 2Z" />
              </svg>
            </a>
            <button id="shareCurrentBtn" class="ghost-btn" type="button" data-i18n="share">分享</button>
            <div class="compact-toggle lang-toggle" id="languageModes" aria-label="Language">
              <button data-lang="zh" type="button" title="中文">中</button>
              <button data-lang="en" type="button" title="English">EN</button>
            </div>
            <button id="themeToggleBtn" class="theme-toggle-btn" type="button" aria-label="深色" title="深色">☀</button>
          </div>
        </div>

        <div class="chart-control-bar">
          <div class="chart-control-group">
            <span class="toolbar-label" data-i18n="scaleGroup">坐标</span>
            <div class="scale-toggle" id="chartScaleModes" aria-label="坐标类型" data-i18n-aria-label="scaleType">
              <button data-scale="linear" type="button" data-i18n="linearScale">普通</button>
              <button data-scale="log" type="button" data-i18n="logScale">指数</button>
            </div>
          </div>
          <div class="chart-action-group">
            <button id="addCurrentCompareBtn" type="button" class="ghost-btn" data-i18n="newCompareItem">新增组合</button>
            <button id="resetZoomBtn" type="button" class="ghost-btn" data-i18n="resetRange">重置区间</button>
          </div>
        </div>

        <section class="chart-panel">
          <canvas id="equityCanvas" width="1200" height="560"></canvas>
          <div id="tooltip" class="tooltip"></div>
          <div id="chartLoading" class="chart-loading" aria-live="polite" data-i18n="backtesting">回测中</div>
        </section>

        <section id="comparisonPanel" class="comparison-panel" hidden></section>

        <section id="analysisDetails" class="analysis-details collapsible-module expanded">
          <button id="analysisToggleBtn" type="button" class="collapsible-module-head" aria-expanded="true">
            <span class="collapsible-module-icon" aria-hidden="true"></span>
            <span class="collapsible-module-copy">
              <strong data-i18n="analysisDetails">回测详情</strong>
              <span data-i18n="analysisCollapsedHint">已折叠指标、相关性和再平衡记录</span>
            </span>
            <span id="analysisToggleText" class="collapsible-module-action" data-i18n="collapseDetails">折叠详情</span>
          </button>
          <div class="collapsible-module-body">
            <div class="collapsible-module-inner analysis-detail-inner">
              <section class="metrics-grid" id="metricsGrid"></section>

              <section class="lower-grid">
                <div class="panel">
                  <div class="panel-title">
                    <span data-i18n="correlation">相关性</span>
                  </div>
                  <div id="corrMatrix" class="corr-matrix"></div>
                </div>
                <div class="panel">
                  <div class="panel-title">
                    <span data-i18n="rebalanceRecords">再平衡记录</span>
                  </div>
                  <div id="rebalanceTable" class="event-table"></div>
                </div>
              </section>
            </div>
          </div>
        </section>

        <section id="optimizerResults" class="optimizer-list optimizer-workbench collapsible-module expanded"></section>
      </section>
    </main>
    <script>
      window.PORTFOLIO_KEY_HELP_URL = __PORTFOLIO_KEY_HELP_URL__;
      window.ALLOCLAB_AUTH_REQUIRED = __ALLOCLAB_AUTH_REQUIRED__;
    </script>
    <div id="shareOverlay" class="share-overlay" aria-hidden="true">
      <section class="share-dialog" role="dialog" aria-modal="true" aria-labelledby="shareTitle">
        <div class="share-head">
          <div>
            <h2 id="shareTitle" data-i18n="sharePreview">分享预览</h2>
            <p id="shareSubtitle"></p>
          </div>
          <button id="shareCloseBtn" class="icon-btn" type="button" data-i18n-title="close" title="关闭">×</button>
        </div>
        <label id="shareNameRow" class="share-name-row">
          <span data-i18n="portfolioName">组合名称</span>
          <input id="shareNameInput" type="text" />
        </label>
        <div class="share-hero">
          <div id="sharePrimaryMetric" class="share-primary-metric"></div>
          <canvas id="shareCurveCanvas" width="520" height="160"></canvas>
        </div>
        <div id="shareMetrics" class="share-metrics"></div>
        <div id="shareSummary" class="share-summary"></div>
        <label class="share-link-row">
          <span data-i18n="shareLink">分享链接</span>
          <input id="shareLinkInput" type="text" readonly />
          <button id="shareCopyBtn" class="ghost-btn" type="button" data-i18n="copy">复制</button>
        </label>
        <div id="shareStatus" class="share-status"></div>
        <div class="share-actions">
          <button id="shareCreateBtn" class="primary-btn" type="button" data-i18n="createShareLink">生成分享链接</button>
          <button id="shareApplyBtn" class="primary-btn" type="button" data-i18n="applyToView">应用到当前视图</button>
        </div>
      </section>
    </div>
    <div id="compareEditorOverlay" class="compare-editor-overlay" aria-hidden="true">
      <form id="compareEditorForm" class="compare-editor-dialog" role="dialog" aria-modal="true" aria-labelledby="compareEditorTitle">
        <div class="compare-editor-head">
          <div>
            <h2 id="compareEditorTitle" data-i18n="compareEditorTitle">组合配置</h2>
            <p id="compareEditorSubtitle" data-i18n="compareEditorHint">配置后会作为独立组合加入对比，不影响左侧当前参数。</p>
          </div>
          <button id="compareEditorCloseBtn" class="icon-btn" type="button" data-i18n-title="close" title="关闭">×</button>
        </div>
        <label class="compare-editor-name">
          <span data-i18n="portfolioName">组合名称</span>
          <input id="compareEditorNameInput" type="text" />
        </label>
        <div class="compare-editor-section">
          <div class="compare-editor-section-head">
            <span data-i18n="assets">标的</span>
            <button id="compareEditorAddAssetBtn" class="ghost-btn" type="button" data-i18n="addAsset">添加标的</button>
          </div>
          <div id="compareEditorAssets" class="compare-editor-assets"></div>
          <button id="compareEditorNormalizeBtn" class="ghost-btn" type="button" data-i18n="normalize">归一化</button>
        </div>
        <div class="compare-editor-grid">
          <label>
            <span data-i18n="rebalance">再平衡</span>
            <select id="compareEditorRebalanceMode">
              <option value="none" data-i18n="rebalanceNone">不再平衡</option>
              <option value="monthly" data-i18n="rebalanceMonthly">每月</option>
              <option value="quarterly" data-i18n="rebalanceQuarterly">每季</option>
              <option value="annual" data-i18n="rebalanceAnnual">每年</option>
              <option value="threshold" data-i18n="rebalanceThreshold">阈值</option>
            </select>
          </label>
          <label>
            <span data-i18n="threshold">阈值</span>
            <input id="compareEditorThresholdInput" type="number" min="1" max="50" step="1" value="20" />
          </label>
        </div>
        <div id="compareEditorError" class="compare-editor-error"></div>
        <div class="compare-editor-actions">
          <button id="compareEditorCancelBtn" class="ghost-btn" type="button" data-i18n="cancel">取消</button>
          <button id="compareEditorSubmitBtn" class="primary-btn" type="submit" data-i18n="saveToCompare">保存到对比</button>
        </div>
      </form>
    </div>
    <script src="/app.js?v=20260616-seed"></script>
  </body>
</html>
